<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Pozadí -->
  <!--rect width="100%" height="100%" fill="black"/-->

  <!-- Osa rotace -->
  <!--line x1="120" y1="60" x2="280" y2="340" stroke="white" stroke-width="2"/-->

  <!-- Skupina planety (rotující) -->
  <g id="planet">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="8s"
      repeatCount="indefinite" />

    <!-- Tělo planety -->
    <circle cx="200" cy="200" r="80" fill="rgba(0,120,255,0.35)" stroke="white" stroke-width="2" />

    <!-- Rovník -->
    <ellipse cx="200" cy="200" rx="80" ry="20" fill="none" stroke="white" stroke-dasharray="6 6" />

    <!-- Stín (terminátor) -->
    <circle cx="215" cy="200" r="80" fill="rgba(0,0,0,0.25)" />

  </g>

</svg>