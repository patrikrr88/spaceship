<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Pozadí -->
  <!--rect width="100%" height="100%" fill="black"/-->

  <!-- Planeta -->
  <circle cx="200" cy="200" r="40" fill="rgba(0,120,255,0.4)" stroke="white" stroke-width="2" />

  <!-- Radiové vlny -->
  <circle cx="200" cy="200" r="60" fill="none" stroke="cyan" stroke-width="2" opacity="0.6">
    <animate attributeName="r" from="40" to="160" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.6" to="0" dur="3s" repeatCount="indefinite" />
  </circle>

  <circle cx="200" cy="200" r="60" fill="none" stroke="cyan" stroke-width="2" opacity="0.6">
    <animate attributeName="r" from="40" to="160" dur="3s" begin="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.6" to="0" dur="3s" begin="1.5s" repeatCount="indefinite" />
  </circle>

</svg>