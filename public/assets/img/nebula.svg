<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Pozadí -->
  <!--rect width="100%" height="100%" fill="black"/-->

  <!-- Mlhovina – vrstvy -->
  <ellipse cx="180" cy="200" rx="90" ry="60" fill="rgba(180,80,255,0.18)" />

  <ellipse cx="220" cy="190" rx="70" ry="50" fill="rgba(100,150,255,0.18)" />

  <ellipse cx="200" cy="230" rx="100" ry="70" fill="rgba(80,255,180,0.12)" />

  <!-- Jemná pulzace celé mlhoviny -->
