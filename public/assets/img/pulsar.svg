<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Pozadí -->
  <!--rect width="100%" height="100%" fill="black"/-->

  <!-- Osa rotace -->
  <!--line x1="200" y1="80" x2="200" y2="320" stroke="white" stroke-width="1" stroke-dasharray="4 4"/-->

  <!-- Skupina pulsaru -->
  <g id="pulsar">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="1.5s"
      repeatCount="indefinite" />

    <!-- Paprsek -->
    <polygon points="200,200 350,180 350,220" fill="rgba(0,200,255,0.4)" />

    <!-- Protilehlý paprsek -->
    <polygon points="200,200 50,180 50,220" fill="rgba(0,200,255,0.2)" />
  </g>

  <!-- Neutronová hvězda -->
  <circle cx="200" cy="200" r="6" fill="white" />

</svg>