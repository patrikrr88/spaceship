<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Pozadí -->
  <!--rect width="100%" height="100%" fill="black"/-->

  <!-- Hvězda -->
  <circle cx="200" cy="200" r="12" fill="white">

    <!-- Pulzace velikosti -->
    <animate attributeName="r" from="10" to="14" dur="2s" repeatCount="indefinite" direction="alternate" />

    <!-- Pulzace jasu -->
    <animate attributeName="opacity" from="0.6" to="1" dur="2s" repeatCount="indefinite" direction="alternate" />
  </circle>

  <!-- Jemná záře -->
  <circle cx="200" cy="200" r="25" fill="rgba(255,255,255,0.15)">
    <animate attributeName="opacity" from="0.1" to="0.3" dur="2s" repeatCount="indefinite" direction="alternate" />
  </circle>

</svg>