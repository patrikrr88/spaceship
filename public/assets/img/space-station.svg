<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Pozadí -->
  <!--rect width="100%" height="100%" fill="black"/-->

  <!-- Rotující prstenec -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 300 200" to="360 300 200" dur="12s"
      repeatCount="indefinite" />

    <!-- Vnější elipsa torusu -->
    <ellipse cx="300" cy="200" rx="150" ry="90" fill="rgba(200,200,200,0.18)" stroke="white" stroke-width="2" />

    <!-- Vnitřní elipsa torusu -->
    <ellipse cx="300" cy="200" rx="120" ry="70" fill="none" stroke="white" stroke-width="2" />
  </g>

  <!-- Centrální válec – zadní čelo -->
  <ellipse cx="300" cy="225" rx="50" ry="15" fill="rgba(0,150,255,0.25)" stroke="white" stroke-width="2" />

  <!-- Plášť válce -->
  <rect x="250" y="175" width="100" height="50" fill="rgba(0,150,255,0.25)" stroke="white" stroke-width="2" />

  <!-- Přední čelo -->
  <ellipse cx="300" cy="175" rx="50" ry="15" fill="rgba(0,150,255,0.4)" stroke="white" stroke-width="2" />

</svg>