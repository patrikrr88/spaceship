<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

        <!-- Pozadí -->
        <!--rect width="100%" height="100%" fill="black" /-->

        <!-- Země -->
        <circle cx="200" cy="200" r="50" fill="rgba(0,120,255,0.4)" stroke="white" stroke-width="2" />

        <!-- Dráha -->
        <circle cx="200" cy="200" r="120" fill="none" stroke="white" stroke-dasharray="4 4" opacity="0.5" />

        <!-- Skupina Lajky -->
        <g id="laika">
                <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="10s"
                        repeatCount="indefinite" />

                <!-- Kapsle -->
                <circle cx="200" cy="80" r="10" fill="rgba(200,200,200,0.6)" stroke="white" />

                <!-- "Pes" – jen dvě tečky -->
                <circle cx="197" cy="78" r="1.5" fill="white" />
                <circle cx="203" cy="78" r="1.5" fill="white" />
        </g>

</svg>