<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Pozadí -->
  <!--rect width="100%" height="100%" fill="black"/-->

  <!-- Skupina hvězd -->
  <g id="cluster">

    <!-- Jasnější jádro -->
    <circle cx="200" cy="200" r="3" fill="white" />
    <circle cx="210" cy="190" r="2.5" fill="white" />
    <circle cx="190" cy="210" r="2.5" fill="white" />
    <circle cx="220" cy="210" r="2" fill="white" />
    <circle cx="180" cy="190" r="2" fill="white" />

    <!-- Okolní hvězdy -->
    <circle cx="160" cy="160" r="1.5" fill="white" />
    <circle cx="250" cy="170" r="1.5" fill="white" />
    <circle cx="140" cy="240" r="1.5" fill="white" />
    <circle cx="260" cy="250" r="1.5" fill="white" />
    <circle cx="200" cy="140" r="1.5" fill="white" />
    <circle cx="200" cy="270" r="1.5" fill="white" />
    <circle cx="120" cy="200" r="1.2" fill="white" />
    <circle cx="280" cy="200" r="1.2" fill="white" />

    <!-- Náhodné slabé hvězdy -->
    <circle cx="90" cy="90" r="1" fill="white" />
    <circle cx="310" cy="100" r="1" fill="white" />
    <circle cx="330" cy="300" r="1" fill="white" />
    <circle cx="70" cy="310" r="1" fill="white" />

    <!-- Jemná pulzace celé kupy -->
    <animate attributeName="opacity" from="0.8" to="1" dur="4s" repeatCount="indefinite" direction="alternate" />

  </g>

</svg>